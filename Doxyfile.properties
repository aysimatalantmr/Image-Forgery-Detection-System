PROJECT_NAME           = "AI Goruntu Dedektoru"
OUTPUT_DIRECTORY       = .

# HTML Ayarları
GENERATE_HTML          = YES
HTML_OUTPUT            = docs_html

# PDF (LaTeX) Ayarları - 10 Puanlık Çıktı İçin
GENERATE_LATEX         = YES
LATEX_OUTPUT           = docs_latex

# Python Kodları ve Kapsam Ayarları
OPTIMIZE_OUTPUT_JAVA   = YES
EXTRACT_ALL            = YES
EXTRACT_PRIVATE        = YES
EXTRACT_STATIC         = YES

# Graphviz ve UML (Oklar ve Şemalar) Ayarları
HAVE_DOT               = YES
DOT_NUM_THREADS        = 4
UML_LOOK               = YES
DOT_IMAGE_FORMAT       = png
INTERACTIVE_SVG        = NO
GRAPHICAL_HIERARCHY    = YES
ALLEXTERNALS           = YES

# Çizilecek Grafik Türleri
CLASS_GRAPH            = YES
COLLABORATION_GRAPH    = YES
CALL_GRAPH             = YES
CALLER_GRAPH           = YES
INCLUDE_GRAPH          = YES
INCLUDED_BY_GRAPH      = YES
DIRECTORY_GRAPH        = YES

# Grafik Sınırları ve Derinlik
DOT_GRAPH_MAX_NODES    = 100
MAX_DOT_GRAPH_DEPTH    = 1000

# Tarama ve Dışlama Ayarları
RECURSIVE              = YES
FILE_PATTERNS          = *.py *.md
EXCLUDE                = venv/ \
                         migrations/ \
                         manage.py \
                         settings.py \
                         ai_detector/settings.py
