PROJECT_NAME           = "AI Goruntu Dedektoru"
OUTPUT_DIRECTORY       = .
GENERATE_HTML          = YES
HTML_OUTPUT            = docs_html

# ⚠️ PDF İSTENİYORDU: Ödev görselinde "Doxygen ile oluşturulan Pdf" maddesi var. 
# GitHub Actions veya yerelde PDF üretebilmek için bunu YES yapmalısın.
GENERATE_LATEX         = YES
LATEX_OUTPUT           = docs_latex

# Python için en optimize ayar:
OPTIMIZE_OUTPUT_JAVA   = YES
EXTRACT_ALL            = YES
EXTRACT_PRIVATE        = YES
EXTRACT_STATIC         = YES

# Graphviz Yapılandırması (Temizlenmiş ve Eksikleri Eklenmiş):
HAVE_DOT               = YES
DOT_NUM_THREADS        = 4
UML_LOOK               = YES

# Çizilecek grafiklerin aktif edilmesi:
CLASS_GRAPH            = YES
COLLABORATION_GRAPH    = YES
CALL_GRAPH             = YES
CALLER_GRAPH           = YES
INCLUDE_GRAPH          = YES
INCLUDED_BY_GRAPH      = YES
DIRECTORY_GRAPH        = YES

# ⚠️ EN KRİTİK AYAR: Grafiklerin HTML'de görünmesini sağlar
DOT_GRAPH_MAX_NODES    = 100
MAX_DOT_GRAPH_DEPTH    = 1000

# Tarama Ayarları:
RECURSIVE              = YES
FILE_PATTERNS          = *.py *.md
EXCLUDE                = venv/ migrations/ manage.py settings.py ai_detector/settings.py
